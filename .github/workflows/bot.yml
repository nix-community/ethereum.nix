name: Bot Commands

on:
  issue_comment:
    types: [created]

jobs:
  rebase:
    if: >-
      github.event.issue.pull_request
      && contains(github.event.comment.body, '/rebase')
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: React with rocket to acknowledge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='rocket'

      - name: Check permissions
        id: check-perms
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          permission=$(gh api \
            repos/${{ github.repository }}/collaborators/${{ github.event.comment.user.login }}/permission \
            --jq '.permission')

          if [[ "$permission" != "admin" && "$permission" != "write" ]]; then
            gh api \
              repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
              -f content='-1'
            echo "User ${{ github.event.comment.user.login }} has '$permission' permission, need write or admin"
            exit 1
          fi

      - name: Get PR details
        id: pr-details
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          pr_json=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})

          head_ref=$(echo "$pr_json" | jq -r '.head.ref')
          base_ref=$(echo "$pr_json" | jq -r '.base.ref')
          head_repo_full_name=$(echo "$pr_json" | jq -r '.head.repo.full_name')

          echo "head_ref=$head_ref" >> "$GITHUB_OUTPUT"
          echo "base_ref=$base_ref" >> "$GITHUB_OUTPUT"
          echo "head_repo=$head_repo_full_name" >> "$GITHUB_OUTPUT"

          if [[ "$head_repo_full_name" != "${{ github.repository }}" ]]; then
            gh api \
              repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
              -f body="Cannot rebase: this PR is from a fork (\`$head_repo_full_name\`). Please rebase locally."
            exit 1
          fi

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ steps.pr-details.outputs.head_ref }}
          fetch-depth: 0

      - name: Rebase onto base branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin ${{ steps.pr-details.outputs.base_ref }}
          git rebase origin/${{ steps.pr-details.outputs.base_ref }}

      - name: Push signed commits
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          head_ref="${{ steps.pr-details.outputs.head_ref }}"
          base_ref="${{ steps.pr-details.outputs.base_ref }}"
          repo="${{ github.repository }}"

          commits=$(git rev-list --reverse "origin/${base_ref}..HEAD")

          if [[ -z "$commits" ]]; then
            echo "Branch is already up-to-date"
            exit 0
          fi

          # Reset the remote branch to the base so we can recreate commits
          # using the GraphQL API, which produces GitHub-signed commits.
          # The REST API (git/commits) does NOT sign commits.
          base_sha=$(git rev-parse "origin/${base_ref}")
          gh api "repos/${repo}/git/refs/heads/${head_ref}" \
            -X PATCH -f "sha=${base_sha}" -F "force=true"

          prev_oid="${base_sha}"

          for sha in $commits; do
            headline=$(git log -1 --format='%s' "$sha")
            body=$(git log -1 --format='%b' "$sha")

            # Preserve original author via Co-authored-by trailer
            author_name=$(git log -1 --format='%an' "$sha")
            author_email=$(git log -1 --format='%ae' "$sha")
            if [[ "$author_email" != *"[bot]@users.noreply.github.com" ]]; then
              co_author="Co-authored-by: ${author_name} <${author_email}>"
              if ! printf '%s' "$body" | grep -qF "$co_author"; then
                if [[ -n "$body" ]]; then
                  body=$(printf '%s\n%s' "$body" "$co_author")
                else
                  body="$co_author"
                fi
              fi
            fi

            # Compute file changes for this commit
            additions="[]"
            deletions="[]"

            while IFS=$'\t' read -r status path; do
              case "$status" in
                D)
                  deletions=$(jq -nc --argjson d "$deletions" --arg p "$path" \
                    '$d + [{path: $p}]')
                  ;;
                *)
                  content=$(git show "${sha}:${path}" | base64 -w0)
                  additions=$(jq -nc --argjson a "$additions" --arg p "$path" --arg c "$content" \
                    '$a + [{path: $p, contents: $c}]')
                  ;;
              esac
            done < <(git diff-tree --no-commit-id -r --no-renames --name-status "$sha")

            # Create signed commit via GraphQL createCommitOnBranch
            jq -n \
              --arg repo "$repo" \
              --arg branch "$head_ref" \
              --arg oid "$prev_oid" \
              --arg headline "$headline" \
              --arg body "$body" \
              --argjson additions "$additions" \
              --argjson deletions "$deletions" \
              '{
                query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid } } }",
                variables: {
                  input: {
                    branch: {
                      repositoryNameWithOwner: $repo,
                      branchName: $branch
                    },
                    message: (
                      {headline: $headline}
                      + if $body != "" then {body: $body} else {} end
                    ),
                    expectedHeadOid: $oid,
                    fileChanges: {
                      additions: $additions,
                      deletions: $deletions
                    }
                  }
                }
              }' > /tmp/mutation.json

            prev_oid=$(gh api graphql --input /tmp/mutation.json --jq '.data.createCommitOnBranch.commit.oid')

            if [[ -z "$prev_oid" || "$prev_oid" == "null" ]]; then
              echo "::error::Failed to create signed commit for $(git log -1 --format='%h %s' "$sha")"
              cat /tmp/mutation.json | gh api graphql --input - 2>&1 || true
              exit 1
            fi

            echo "Created signed commit: ${prev_oid:0:12} (from $(git log -1 --format='%h' "$sha"))"
          done

      - name: React with success
        if: success()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='hooray'

      - name: React with failure
        if: failure()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content='confused'
